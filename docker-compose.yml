version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fairlens
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=default-insecure-secret-key-change-in-production
      - AI_PROVIDER=stub
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fairlens
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: celery -A apps.api.core.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fairlens
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=default-insecure-secret-key-change-in-production
      - AI_PROVIDER=stub
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  api_data:
  pg_data:
