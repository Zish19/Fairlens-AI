name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Turborepo Lint & Build
        run: npm run build

  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fairlens
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fairlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r services/ml_engine/requirements.txt
          pip install pytest httpx
          
      - name: Run Alembic Migrations
        env:
          DATABASE_URL: postgresql://fairlens:password@localhost:5432/fairlens
          SECRET_KEY: test-secret-key-at-least-32-chars-long
          REDIS_URL: redis://localhost:6379/0
          AI_PROVIDER: stub
        run: |
          alembic upgrade head
          
      - name: Check Alembic Migration Status
        env:
          DATABASE_URL: postgresql://fairlens:password@localhost:5432/fairlens
          SECRET_KEY: test-secret-key-at-least-32-chars-long
          REDIS_URL: redis://localhost:6379/0
          AI_PROVIDER: stub
        run: |
          alembic check

      - name: Run API Tests
        env:
          ENVIRONMENT: testing
          SECRET_KEY: test-secret-key-at-least-32-chars-long
          DATABASE_URL: postgresql://fairlens:password@localhost:5432/fairlens
          REDIS_URL: redis://localhost:6379/0
          AI_PROVIDER: stub
        run: pytest apps/api/

  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and start Docker services
        run: |
          docker compose build
          docker compose up -d
          
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to start..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/health; then
              echo "API is up!"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start in time"
          docker compose logs
          exit 1
          
      - name: Stop services
        if: always()
        run: docker compose down
